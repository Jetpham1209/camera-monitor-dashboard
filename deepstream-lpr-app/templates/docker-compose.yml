services:
  deepstream-lpr:
    image: ${DEEPSTREAM_IMAGE}
    container_name: deepstream-lpr
    network_mode: host
    ipc: host
    privileged: true
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - ${APP_ROOT}:/workspace/deepstream-lpr-app
      - /tmp/.X11-unix:/tmp/.X11-unix
    working_dir: /workspace/deepstream-lpr-app
    command: python3 deepstream/deepstream_lpr_app.py --config runtime/config.json
    restart: unless-stopped
