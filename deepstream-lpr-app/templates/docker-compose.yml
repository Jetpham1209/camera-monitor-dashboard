services:
  deepstream-lpr:
    image: ${DEEPSTREAM_IMAGE}
    container_name: deepstream-lpr
    network_mode: host
    ipc: host
    privileged: true
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - CUDA_VER=${CUDA_VER}
      - DEEPSTREAM_VERSION=${DEEPSTREAM_VERSION}
    volumes:
      - ${APP_ROOT}:/workspace/deepstream-lpr-app
    working_dir: /workspace/deepstream-lpr-app
    command: python3 deepstream/deepstream_lpr_app.py --config runtime/config.json
    restart: unless-stopped
