services:
  deepstream-lpr-control:
    build:
      context: ..
      dockerfile: deepstream-lpr-app/docker/control.Dockerfile
    image: camera-monitor-lpr-control:local
    container_name: deepstream-lpr-control
    network_mode: host
    restart: always
    environment:
      LPR_CONTROL_PORT: ${LPR_CONTROL_PORT:-5190}
      MODEL_BUILDER_IMAGE: ${MODEL_BUILDER_IMAGE:-deepstream-lpr-model-builder:local}
      MODEL_BUILDER_BASE_IMAGE: ${MODEL_BUILDER_BASE_IMAGE:-ultralytics/ultralytics:latest-jetson-jetpack6}
      MODEL_BUILDER_AUTO_BUILD: ${MODEL_BUILDER_AUTO_BUILD:-1}
      MODEL_BUILDER_FORCE_BUILD: ${MODEL_BUILDER_FORCE_BUILD:-0}
      DOCKER_RUNTIME_ARGS: ${DOCKER_RUNTIME_ARGS:---runtime nvidia}
      DEEPSTREAM_IMAGE: ${DEEPSTREAM_IMAGE:-camera-monitor-deepstream-runtime:local}
      DEEPSTREAM_PROFILE: ${DEEPSTREAM_PROFILE:-unknown}
      DEEPSTREAM_VERSION: ${DEEPSTREAM_VERSION:-unknown}
      DEEPSTREAM_BASE_IMAGE: ${DEEPSTREAM_BASE_IMAGE:-nvcr.io/nvidia/deepstream:7.0-triton-multiarch}
      CUDA_VER: ${CUDA_VER:-12.2}
      TENSORRT_VERSION: ${TENSORRT_VERSION:-unknown}
      JETPACK_VERSION: ${JETPACK_VERSION:-unknown}
      L4T_VERSION: ${L4T_VERSION:-unknown}
      DEEPSTREAM_YOLO_REPO: ${DEEPSTREAM_YOLO_REPO:-https://github.com/marcoslucianops/DeepStream-Yolo.git}
      DEEPSTREAM_YOLO_REF: ${DEEPSTREAM_YOLO_REF:-2894babce8e75c49115dbe0c7b516289ed853565}
    volumes:
      - ${HOST_REPO_ROOT:?Set HOST_REPO_ROOT to the absolute repo path}:${HOST_REPO_ROOT:?Set HOST_REPO_ROOT to the absolute repo path}
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/.X11-unix:/tmp/.X11-unix
    working_dir: ${HOST_REPO_ROOT:?Set HOST_REPO_ROOT to the absolute repo path}
    command: ["node", "deepstream-lpr-app/control-server/server.js"]
